<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <title>Chat Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { max-width: 900px; margin: 0 auto; background: white; height: 90vh; border-radius: 15px; display: flex; flex-direction: column; shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #4f46e5; color: white; padding: 20px; font-size: 20px; font-weight: bold; text-align: center; }
        
        #admin-msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #f9fafb; }
        
        .msg-row { display: flex; flex-direction: column; max-width: 70%; }
        .customer-row { align-self: flex-start; }
        .admin-row { align-self: flex-end; }
        
        .bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; position: relative; }
        .customer-bubble { background: #ffffff; border: 1px solid #e5e7eb; color: #1f2937; }
        .admin-bubble { background: #4f46e5; color: white; }
        
        .sender-name { font-size: 11px; margin-bottom: 4px; color: #6b7280; font-weight: bold; }
        .admin-row .sender-name { text-align: right; }

        img.chat-img { max-width: 250px; border-radius: 8px; cursor: pointer; border: 2px solid #ddd; margin-top: 5px; }
        audio { height: 35px; margin-top: 5px; }

        .input-area { padding: 20px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { background: #4f46e5; color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">Support Dashboard (Admin) 🛠️</div>
    <div id="admin-msgs"></div>
    <div class="input-area">
        <input type="text" id="admin-input" placeholder="Type your reply here...">
        <button id="send-reply">Send Reply</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const fbConfig = {
        apiKey: "AIzaSyCSpUoYUJH17_IrWNpzQj@ME-6Ri_n5-jQ",
        databaseURL: "https://chat-1dd78-default-rtdb.firebaseio.com",
        projectId: "chat-1dd78",
    };
    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();

    const msgsContainer = document.getElementById('admin-msgs');
    const replyInput = document.getElementById('admin-input');

    // میسجز دکھانے کا فنکشن
    db.ref('public_chat').on('value', snap => {
        msgsContainer.innerHTML = '';
        snap.forEach(child => {
            const data = child.val();
            const isAdmin = data.sender === 'admin';
            const rowClass = isAdmin ? 'admin-row' : 'customer-row';
            const bubbleClass = isAdmin ? 'admin-bubble' : 'customer-bubble';
            
            let content = '';
            if(data.type === 'image') {
                content = `<img src="${data.text}" class="chat-img" onclick="window.open(this.src)">`;
            } else if(data.type === 'voice') {
                content = `<audio controls src="${data.text}"></audio>`;
            } else {
                content = `<div>${data.text}</div>`;
            }

            msgsContainer.innerHTML += `
                <div class="msg-row ${rowClass}">
                    <span class="sender-name">${isAdmin ? 'You (Admin)' : data.name}</span>
                    <div class="bubble ${bubbleClass}">${content}</div>
                </div>
            `;
        });
        msgsContainer.scrollTop = msgsContainer.scrollHeight;
    });

    // ایڈمن کا جواب بھیجنا
    function sendReply() {
        const text = replyInput.value.trim();
        if(!text) return;

        db.ref('public_chat').push({
            text: text,
            type: 'text',
            sender: 'admin',
            name: 'Admin',
            time: Date.now()
        });
        replyInput.value = '';
    }

    document.getElementById('send-reply').onclick = sendReply;
    replyInput.onkeypress = (e) => { if(e.key === 'Enter') sendReply(); };
</script>

</body>
</html>
